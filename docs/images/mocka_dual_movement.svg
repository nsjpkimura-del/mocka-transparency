<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">

<style>
.title { font: bold 28px sans-serif; fill: #ffffff; }
.label { font: bold 18px sans-serif; fill: #ffffff; }
.text { font: 16px sans-serif; fill: #ffffff; }
.box { fill: #1f2937; stroke: #60a5fa; stroke-width:2; rx:10; }
.arrow { stroke:#9ca3af; stroke-width:2; marker-end:url(#arrow); }
</style>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto">
<path d="M0,0 L10,3 L0,6 Z" fill="#9ca3af"/>
</marker>
</defs>

<rect width="100%" height="100%" fill="#0b1220"/>

<text x="450" y="60" text-anchor="middle" class="title">MoCKA Dual Movement Architecture</text>

<rect x="120" y="150" width="260" height="120" class="box"/>
<text x="250" y="190" text-anchor="middle" class="label">Primary Movement</text>
<text x="250" y="220" text-anchor="middle" class="text">Research Pipeline</text>
<text x="250" y="245" text-anchor="middle" class="text">Verification Flow</text>

<rect x="520" y="150" width="260" height="120" class="box"/>
<text x="650" y="190" text-anchor="middle" class="label">Shadow Movement</text>
<text x="650" y="220" text-anchor="middle" class="text">Fallback Research Path</text>
<text x="650" y="245" text-anchor="middle" class="text">Minimum Capability 75%</text>

<line x1="380" y1="210" x2="520" y2="210" class="arrow"/>
<line x1="520" y1="240" x2="380" y2="240" class="arrow"/>

</svg>
